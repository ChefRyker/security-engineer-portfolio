name: DAST — OWASP ZAP

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"  # weekly Monday 3am UTC

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      # Spin up the sample app so ZAP has something to test
      - name: Start sample app
        run: |
          cd sample-app
          pip install -r requirements.txt
          python app.py &
          # Wait for the app to be ready
          for i in {1..15}; do
            curl -sf http://localhost:5000/health && break
            sleep 2
          done

      # ZAP baseline scan — passive only, no active attacks
      # Switch to zap-full-scan for active testing in a safe environment
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:5000"
          rules_file_name: ".github/zap-rules.tsv"
          cmd_options: "-a"   # include alpha passive rules
          issue_title: "ZAP Baseline — Security Findings"
          fail_action: false  # report but don't fail; tune to true once baseline is clean

      - name: Upload ZAP SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
