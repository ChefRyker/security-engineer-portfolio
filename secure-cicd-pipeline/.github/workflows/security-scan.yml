name: Security Scan

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # -----------------------------------------------------------------------
  # Secret Scanning — block credentials before they land in git history
  # -----------------------------------------------------------------------
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can diff all commits

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # optional for teams

  # -----------------------------------------------------------------------
  # SAST — static analysis across multiple engines
  # -----------------------------------------------------------------------
  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Semgrep — broad pattern-based SAST (OWASP Top 10, CVEs, misconfigs)
      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/python
            p/secrets
            p/dockerfile
          generateSarif: "1"

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

      # Bandit — Python-specific SAST
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[sarif]

      - name: Run Bandit
        run: |
          bandit -r sample-app/ \
            --format sarif \
            --output bandit.sarif \
            --severity-level medium \
            --confidence-level medium
        continue-on-error: true  # upload results even on findings

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif

  # -----------------------------------------------------------------------
  # SCA — known CVEs in third-party dependencies
  # -----------------------------------------------------------------------
  sca:
    name: Dependency Audit (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r sample-app/requirements.txt

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit \
            --requirement sample-app/requirements.txt \
            --format json \
            --output pip-audit.json
        continue-on-error: true

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit.json

      # Trivy SCA — also catches OS package CVEs
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./sample-app
          format: sarif
          output: trivy-sca.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SCA SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-sca.sarif

  # -----------------------------------------------------------------------
  # Summary comment on PR
  # -----------------------------------------------------------------------
  pr-summary:
    name: PR Security Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, sca]
    if: github.event_name == 'pull_request' && always()
    steps:
      - name: Post summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'Secret Scan': '${{ needs.secret-scan.result }}',
              'SAST':        '${{ needs.sast.result }}',
              'SCA':         '${{ needs.sca.result }}',
            };
            const icon = r => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            const rows = Object.entries(jobs)
              .map(([name, result]) => `| ${name} | ${icon(result)} ${result} |`)
              .join('\n');
            const body = `## 🔒 Security Scan Results\n\n| Check | Status |\n|-------|--------|\n${rows}\n\n_View detailed findings in the [Security tab](https://github.com/${{ github.repository }}/security/code-scanning)._`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
