name: Container Scan & SBOM

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  packages: write
  id-token: write   # for OIDC-based image signing with cosign

jobs:
  build-and-scan:
    name: Build → Scan → SBOM → Attest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Build image
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/sample-app
          tags: |
            type=sha,prefix=sha-
            type=ref,event=pr,prefix=pr-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image (no push yet — scan first)
        uses: docker/build-push-action@v5
        with:
          context: ./sample-app
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build provenance for supply chain transparency
          provenance: true
          sbom: true

      # -----------------------------------------------------------------------
      # Trivy image scan — fail on CRITICAL CVEs
      # -----------------------------------------------------------------------
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/sample-app:latest
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"   # fail the job if CRITICAL CVEs found
          ignore-unfixed: true

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif

      # -----------------------------------------------------------------------
      # SBOM — CycloneDX format via Syft
      # -----------------------------------------------------------------------
      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft ghcr.io/${{ github.repository }}/sample-app:latest \
            --output cyclonedx-json=sbom.cyclonedx.json \
            --output spdx-json=sbom.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.cyclonedx.json
            sbom.spdx.json

      # -----------------------------------------------------------------------
      # Push image only after scan passes
      # -----------------------------------------------------------------------
      - name: Push image
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: ./sample-app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      # -----------------------------------------------------------------------
      # Sign image with cosign (keyless, OIDC-backed)
      # -----------------------------------------------------------------------
      - name: Install cosign
        if: success()
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: success()
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/sample-app@${{ steps.meta.outputs.digest }}
